<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Link Highlighter</title>
<style>
:root {
  --bg:#f0eeff;
  --card:#ffffff;
  --border:#c7d2fe;
  --shadow:0 10px 30px rgba(99,102,241,0.08);
  --text:#0f172a;
  --muted:#475569;
  --section-title:#000000;
  --toggle-bg:#f8fafc;
  --item-border:#e2e8f0;
  --button-bg-pause:#ef4444;
  --button-bg-resume:#22c55e;
  --button-text:#ffffff;
  --footer:#073d88;
  --accent:#4338ca;
}
body.dark {
  --bg:#0f172a;
  --card:#111827;
  --border:#374151;
  --shadow:0 10px 30px rgba(0,0,0,0.35);
  --text:#f8fafc;
  --muted:#94a3b8;
  --section-title:#e2e8f0;
  --toggle-bg:#1f2937;
  --item-border:#334155;
  --button-bg-pause:#dc2626;
  --button-bg-resume:#22c55e;
  --button-text:#ffffff;
  --footer:#cbd5e1;
  --accent:#8b5cf6;
}
body {
  width:340px;
  margin:0;
  padding:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}
.container {
  padding:18px;
}
.header-card,
.section {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
}
.header-card {
  padding:12px 16px;
  margin-bottom:12px;
  display:flex;
  align-items:flex-start;
  gap:10px;
  position:relative;
}
.header-card > div {
  flex:1;
}
.header-title {
  margin:0;
  font-size:16px;
  letter-spacing:.01em;
  text-align:left;
}
.subtitle {
  margin:4px 0 0;
  font-size:11px;
  color:var(--muted);
  line-height:1.3;
  text-align:left;
}
.theme-toggle {
  width:34px;
  height:34px;
  padding:0;
  border-radius:12px;
  border:none;
  background:var(--accent);
  color:var(--button-text);
  font-size:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.section {
  padding:12px 14px;
  margin-bottom:10px;
}
.section h2 {
  margin:0 0 8px;
  font-size:13px;
  color:var(--section-title);
  text-align:center;
}
.toggle-grid {
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px 8px;
}
.toggle-item {
  display:flex;
  align-items:center;
  justify-content:space-between;
  border:1px solid var(--item-border);
  border-radius:12px;
  padding:8px 10px;
  background:var(--toggle-bg);
}
.toggle-item label {
  display:flex;
  align-items:center;
  gap:10px;
  font-size:13px;
  color:var(--text);
}
input[type='checkbox'] {
  width:18px;
  height:18px;
  accent-color:var(--accent);
}
.color-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.color-card {
  display:flex;
  align-items:center;
  justify-content:space-between;
  border:1px solid var(--item-border);
  border-radius:14px;
  padding:10px 12px;
  background:var(--card);
}
.color-card span {
  font-size:15px;
  color:var(--text);
}
input[type='color'] {
  width:24px;
  height:28px;
  border:none;
  padding:0;
  background:none;
  cursor:pointer;
}
.site-label {
  margin:10px 0 0;
  font-size:12px;
  color:var(--muted);
  line-height:1.5;
}
.status-note {
  margin:6px 0 0;
  font-size:11px;
  color:var(--muted);
  text-align:center;
  line-height:1.3;
  display:none;
}
button {
  width:100%;
  margin-top:4px;
  padding:12px 0;
  border:none;
  border-radius:14px;
  font-size:14px;
  font-weight:600;
  color:var(--button-text);
  cursor:pointer;
}
button.pause { background:var(--button-bg-pause); }
button.resume { background:var(--button-bg-resume); }
.footer {
  margin-top:6px;
  font-size:10px;
  color:var(--footer);
  text-align:center;
}
</style>
</head>
<body>
<div class="container">
  <div class="header-card">
    <button id="themeBtn" class="theme-toggle" type="button" aria-label="Toggle theme">☾</button>
    <div>
      <h1 class="header-title">SEO Link Highlighter</h1>
      <p class="subtitle">Instantly highlight all link types across pages</p>
    </div>
  </div>

  <section class="section">
    <h2>Highlight Controls</h2>
    <div class="toggle-grid">
      <div class="toggle-item"><label for="dofollow"><input type="checkbox" id="dofollow" checked> Do-Follow</label></div>
      <div class="toggle-item"><label for="nofollow"><input type="checkbox" id="nofollow" checked> No-Follow</label></div>
      <div class="toggle-item"><label for="internal"><input type="checkbox" id="internal" checked> Internal</label></div>
      <div class="toggle-item"><label for="external"><input type="checkbox" id="external" checked> External</label></div>
    </div>
    </section>

  <section class="section">
    <h2>Color Picker</h2>
    <div class="color-grid">
      <div class="color-card"><span>Dofollow</span><input type="color" id="dofollowColor" value="#16a34a"></div>
      <div class="color-card"><span>Nofollow</span><input type="color" id="nofollowColor" value="#dc2626"></div>
      <div class="color-card"><span>Internal</span><input type="color" id="internalColor" value="#3b82f6"></div>
      <div class="color-card"><span>External</span><input type="color" id="externalColor" value="#eab308"></div>
    </div>
  </section>

  <button id="pauseBtn" class="pause">Pause On This Site</button>
  <p class="status-note" id="pauseStatus">Loading status...</p>
  <p class="footer">Developed by <a href="https://github.com/ahsanshahzad45678-wq" target="_blank" rel="noopener">Ahsan Shahzad</a></p>
</div>
<script src="popup.js"></script>
</body>
</html>
