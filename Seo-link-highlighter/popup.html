<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Link Highlighter</title>
<style>
:root {
  --bg:#f0eeff;
  --card:#ffffff;
  --border:#c7d2fe;
  --shadow:0 10px 30px rgba(99,102,241,0.08);
  --text:#0f172a;
  --muted:#475569;
  --section-title:#000000;
  --toggle-bg:#f8fafc;
  --item-border:#e2e8f0;
  --button-bg-pause:#ef4444;
  --button-bg-resume:#22c55e;
  --button-text:#ffffff;
  --footer:#073d88;
  --accent:#4338ca;
}
body.dark {
  --bg:#0f172a;
  --card:#111827;
  --border:#374151;
  --shadow:0 10px 30px rgba(0,0,0,0.35);
  --text:#f8fafc;
  --muted:#94a3b8;
  --section-title:#e2e8f0;
  --toggle-bg:#1f2937;
  --item-border:#334155;
  --button-bg-pause:#dc2626;
  --button-bg-resume:#22c55e;
  --button-text:#ffffff;
  --footer:#cbd5e1;
  --accent:#8b5cf6;
}
body {
  width:320px;
  max-width:320px;
  margin:0;
  padding:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}
.container {
  padding:12px;
}
.header-card,
.section {
  background:var(--card);
  border:1px solid var(--item-border);
  border-radius:18px;
  box-shadow:var(--shadow);
}
.header-card {
  padding:12px 14px;
  margin-bottom:12px;
  display:flex;
  align-items:flex-start;
  gap:10px;
  position:relative;
}
.header-card::before {
  display:none;
}
.header-card > div {
  flex:1;
}
#extensionToggle {
  margin-left:auto;
}
.header-title {
  margin:0;
  font-size:15px;
  letter-spacing:.02em;
  text-align:left;
}
.subtitle {
  margin:4px 0 0;
  font-size:11px;
  color:var(--muted);
  line-height:1.35;
  text-align:left;
}
.theme-toggle {
  width:32px;
  height:32px;
  padding:0;
  border-radius:12px;
  border:none;
  background:var(--accent);
  color:var(--button-text);
  font-size:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 8px 16px rgba(67,56,202,0.16);
}
.toggle-switch {
  position:relative;
  width:36px;
  height:20px;
  background:#d1d5db;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:background 0.25s ease;
  padding:0;
  margin-left:8px;
}
.toggle-switch.active {
  background:var(--accent);
}
.toggle-switch::after {
  content:'';
  position:absolute;
  width:16px;
  height:16px;
  background:white;
  border-radius:50%;
  top:2px;
  left:2px;
  transition:left 0.25s ease;
  box-shadow:0 2px 8px rgba(15,23,42,0.14);
}
.toggle-switch.active::after {
  left:18px;
}
.section {
  padding:12px 12px;
  margin-bottom:10px;
  transition:transform 0.2s ease, box-shadow 0.2s ease;
}
.section:hover {
  transform:translateY(-0.5px);
  box-shadow:0 10px 22px rgba(15,23,42,0.08);
}
.section h2 {
  margin:0 0 8px;
  font-size:12px;
  color:var(--section-title);
  text-align:center;
  letter-spacing:.02em;
}
.toggle-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.toggle-item {
  display:flex;
  align-items:center;
  justify-content:space-between;
  border:1px solid var(--item-border);
  border-radius:16px;
  padding:12px 14px;
  background:var(--toggle-bg);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);
  transition:transform 0.2s ease, border-color 0.2s ease;
}
.toggle-item:hover {
  transform:translateY(-0.5px);
  border-color:rgba(67,56,202,0.25);
}
.toggle-item label {
  display:flex;
  align-items:center;
  gap:10px;
  font-size:12px;
  color:var(--text);
}
input[type='checkbox'] {
  width:16px;
  height:16px;
  accent-color:var(--accent);
}
.color-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.color-card {
  display:flex;
  align-items:center;
  justify-content:space-between;
  border:1px solid var(--item-border);
  border-radius:16px;
  padding:10px 12px;
  background:var(--toggle-bg);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);
}
.color-card span {
  font-size:13px;
  color:var(--text);
  font-weight:600;
}
input[type='color'] {
  width:32px;
  height:32px;
  border:none;
  padding:0;
  border-radius:20px;
  background:none;
  cursor:pointer;
}
.site-label {
  margin:10px 0 0;
  font-size:12px;
  color:var(--muted);
  line-height:1.5;
}
.status-note {
  margin:8px 0 0;
  font-size:12px;
  color:var(--muted);
  text-align:center;
  line-height:1.4;
  display:none;
}
button {
  width:100%;
  margin-top:6px;
  padding:10px 0;
  border:none;
  border-radius:16px;
  font-size:13px;
  font-weight:700;
  color:var(--button-text);
  cursor:pointer;
  transition:transform 0.2s ease, box-shadow 0.2s ease;
  box-shadow:0 8px 18px rgba(15,23,42,0.14);
}
button:hover {
  transform:translateY(-0.5px);
}
button.pause { background:linear-gradient(135deg, #ef4444, #f97316); }
button.resume { background:linear-gradient(135deg, #22c55e, #14b8a6); }
.version-badge {
  display:inline-block;
  margin-top:8px;
  padding:3px 8px;
  border-radius:999px;
  font-size:10px;
  font-weight:700;
  color:#4f46e5;
  background:rgba(67,56,202,0.08);
}
.footer {
  margin-top:6px;
  font-size:10px;
  color:var(--muted);
  text-align:center;
}
</style>
</head>
<body>
<div class="container">
  <div class="header-card">
    <button id="themeBtn" class="theme-toggle" type="button" aria-label="Toggle theme">☾</button>
    <div>
      <h1 class="header-title">SEO Link Highlighter</h1>
      <p class="subtitle">Instantly highlight all link types across pages</p>
      <span class="version-badge">v6.2</span>
    </div>
    <button id="extensionToggle" class="toggle-switch active" type="button" aria-label="Toggle extension"></button>
  </div>

  <section class="section">
    <h2>Highlight Controls</h2>
    <div class="toggle-grid">
      <div class="toggle-item"><label for="dofollow"><input type="checkbox" id="dofollow" checked> Do-Follow</label></div>
      <div class="toggle-item"><label for="nofollow"><input type="checkbox" id="nofollow" checked> No-Follow</label></div>
      <div class="toggle-item"><label for="internal"><input type="checkbox" id="internal" checked> Internal</label></div>
      <div class="toggle-item"><label for="external"><input type="checkbox" id="external" checked> External</label></div>
    </div>
    </section>

  <section class="section">
    <h2>Color Picker</h2>
    <div class="color-grid">
      <div class="color-card"><span>Dofollow</span><input type="color" id="dofollowColor" value="#16a34a"></div>
      <div class="color-card"><span>Nofollow</span><input type="color" id="nofollowColor" value="#dc2626"></div>
      <div class="color-card"><span>Internal</span><input type="color" id="internalColor" value="#3b82f6"></div>
      <div class="color-card"><span>External</span><input type="color" id="externalColor" value="#eab308"></div>
    </div>
  </section>

  <button id="pauseBtn" class="pause">Pause On This Site</button>
  <p class="status-note" id="pauseStatus">Loading status...</p>
  <p class="footer">Developed by <a href="https://github.com/ahsanshahzad45678-wq" target="_blank" rel="noopener">Ahsan Shahzad</a></p>
</div>
<script src="popup.js"></script>
</body>
</html>
